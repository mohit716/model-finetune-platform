version: "3.8"

services:
  # ── API Server ─────────────────────────────────────────
  api:
    build: .
    container_name: finetune-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finetune:finetune@postgres:5432/finetune
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - STORAGE_BACKEND=minio
      - STORAGE_PATH=/app/data
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - HF_CACHE_DIR=/app/data/hf_cache
    volumes:
      - model-data:/app/data
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Celery Worker (Fine-Tuning) ────────────────────────
  worker:
    build: .
    container_name: finetune-worker
    environment:
      - DATABASE_URL=postgresql://finetune:finetune@postgres:5432/finetune
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - STORAGE_BACKEND=minio
      - STORAGE_PATH=/app/data
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - HF_CACHE_DIR=/app/data/hf_cache
    volumes:
      - model-data:/app/data
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    # For GPU: uncomment the deploy section below
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finetune-postgres
    environment:
      POSTGRES_USER: finetune
      POSTGRES_PASSWORD: finetune
      POSTGRES_DB: finetune
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finetune-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── MinIO (S3-Compatible Storage) ──────────────────────
  minio:
    image: minio/minio
    container_name: finetune-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # ── Prometheus (Monitoring) ────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: finetune-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # ── Grafana (Dashboards) ───────────────────────────────
  grafana:
    image: grafana/grafana
    container_name: finetune-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    restart: unless-stopped

volumes:
  pg-data:
  minio-data:
  model-data:
